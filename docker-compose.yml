services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build: ./backend
    command: ["scripts/migrate.sh", "python", "main.py"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./backend/pdfs:/app/pdfs
      - ./backend/scripts:/app/scripts
    ports:
      - "8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build: ./backend
    command: python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./backend/pdfs:/app/pdfs
    restart: on-failure
    deploy:
      replicas: 2

  web:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_ vars are baked in at build time — pass as build args, not env.
        # Must be the URL the BROWSER uses (host-mapped port), not the Docker service name.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
